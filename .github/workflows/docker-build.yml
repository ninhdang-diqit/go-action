name: Build and Run Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker compose build

      - name: Run Docker Container
        run: docker compose up -d

      - name: Wait for server to start
        run: sleep 5

      - name: Test API Endpoints
        run: |
          echo "Testing root endpoint at http://localhost:8080/"
          response=$(curl -s http://localhost:8080/)
          echo "Response from /: $response"
          if [[ "$response" != *"Hello from Go Docker Build!"* ]]; then
            echo "::error::Root endpoint test failed"
            exit 1
          fi

          echo "Testing status endpoint at http://localhost:8080/status"
          status_response=$(curl -s http://localhost:8080/status)
          echo "Response from /status: $status_response"
          if [[ "$status_response" != *"\"status\":\"ok\""* ]]; then
            echo "::error::Status endpoint test failed"
            exit 1
          fi

          echo "Server tests passed successfully!"

      - name: View Container Logs
        if: always()
        run: docker compose logs

      - name: Stop Container
        if: always()
        run: docker compose down
